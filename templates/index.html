<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransValidate — Fraud Detection Dashboard (only for demo)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header span { color: #94a3b8; font-size: 14px; }
        .badge { background: #22c55e; color: #000; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

        .container { max-width: 960px; margin: 0 auto; padding: 24px; }

        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab { padding: 8px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; cursor: pointer; font-size: 13px; color: #94a3b8; transition: all 0.15s; }
        .tab:hover { color: #e2e8f0; }
        .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        .panel { display: none; }
        .panel.active { display: block; }

        .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 14px; color: #f1f5f9; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: block; }
        input, select { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #3b82f6; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: #fff; font-size: 12px; padding: 4px 10px; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { font-size: 12px; padding: 6px 14px; }

        .result { margin-top: 16px; padding: 14px; border-radius: 6px; display: none; }
        .result.approved { display: block; background: #052e16; border: 1px solid #22c55e; }
        .result.rejected { display: block; background: #450a0a; border: 1px solid #ef4444; }
        .result .status { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .result.approved .status { color: #22c55e; }
        .result.rejected .status { color: #ef4444; }
        .result .flags { font-size: 13px; color: #cbd5e1; }
        .flag-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; font-weight: 500; }
        .flag-tag.good { background: #14532d; color: #4ade80; }
        .flag-tag.bad { background: #7f1d1d; color: #fca5a5; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px 10px; border-bottom: 1px solid #334155; color: #94a3b8; font-weight: 500; }
        td { padding: 8px 10px; border-bottom: 1px solid #1e293b; }
        tr:hover { background: #1e293b; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-box { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 14px; text-align: center; }
        .stat-box .num { font-size: 28px; font-weight: 700; }
        .stat-box .label { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .stat-box.green .num { color: #22c55e; }
        .stat-box.red .num { color: #ef4444; }
        .stat-box.blue .num { color: #3b82f6; }
        .stat-box.yellow .num { color: #eab308; }

        .config-item { padding: 10px 0; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
        .config-item:last-child { border-bottom: none; }
        .config-key { color: #94a3b8; font-size: 13px; }
        .config-val { color: #e2e8f0; font-size: 13px; font-weight: 500; }

        .bl-form { display: flex; gap: 8px; margin-bottom: 14px; }
        .bl-form input { flex: 1; }

        .empty { text-align: center; color: #475569; padding: 30px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>TransValidate</h1>
        <span>Fraud Detection Dashboard</span>
        <div style="margin-left: auto;"><span class="badge" id="health-badge">CHECKING...</span></div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" data-panel="validate">Validate</div>
            <div class="tab" data-panel="transactions">Transactions</div>
            <div class="tab" data-panel="stats">Stats</div>
            <div class="tab" data-panel="blacklist">Blacklist</div>
            <div class="tab" data-panel="config">Config</div>
        </div>

        <!-- VALIDATE -->
        <div id="validate" class="panel active">
            <div class="card">
                <h2>Validate a Transaction</h2>
                <div class="form-row">
                    <div><label>Amount</label><input type="number" id="v-amount" placeholder="500" step="any"></div>
                    <div><label>Currency</label>
                        <select id="v-currency">
                            <option value="INR">INR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div><label>Sender</label><input type="text" id="v-sender" placeholder="alice"></div>
                    <div><label>Receiver</label><input type="text" id="v-receiver" placeholder="bob"></div>
                </div>
                <button class="btn btn-primary" onclick="validateTxn()">Validate Transaction</button>
                <div id="v-result" class="result"></div>
            </div>
        </div>

        <!-- TRANSACTIONS -->
        <div id="transactions" class="panel">
            <div class="card">
                <h2>Recent Transactions</h2>
                <div id="txn-table"></div>
            </div>
        </div>

        <!-- STATS -->
        <div id="stats" class="panel">
            <div class="card">
                <h2>Dashboard</h2>
                <div id="stats-content"></div>
            </div>
        </div>

        <!-- BLACKLIST -->
        <div id="blacklist" class="panel">
            <div class="card">
                <h2>Blacklist Management</h2>
                <div class="bl-form">
                    <input type="text" id="bl-entity" placeholder="Entity name">
                    <input type="text" id="bl-reason" placeholder="Reason">
                    <button class="btn btn-primary btn-sm" onclick="addBlacklist()">Add</button>
                </div>
                <div id="bl-table"></div>
            </div>
        </div>

        <!-- CONFIG -->
        <div id="config" class="panel">
            <div class="card">
                <h2>Active Rules &amp; Limits</h2>
                <div id="config-content"></div>
            </div>
        </div>
    </div>

<script>
    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.panel).classList.add('active');

            const panel = tab.dataset.panel;
            if (panel === 'transactions') loadTransactions();
            if (panel === 'stats') loadStats();
            if (panel === 'blacklist') loadBlacklist();
            if (panel === 'config') loadConfig();
        });
    });

    // --- Health ---
    fetch('/health').then(r => r.json()).then(d => {
        const b = document.getElementById('health-badge');
        b.textContent = 'HEALTHY';
        b.style.background = '#22c55e';
    }).catch(() => {
        const b = document.getElementById('health-badge');
        b.textContent = 'DOWN';
        b.style.background = '#ef4444';
    });

    // --- Validate ---
    function validateTxn() {
        const body = {
            amount: parseFloat(document.getElementById('v-amount').value),
            currency: document.getElementById('v-currency').value,
            sender: document.getElementById('v-sender').value.trim(),
            receiver: document.getElementById('v-receiver').value.trim()
        };
        fetch('/validate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('v-result');
            const cls = data.valid ? 'approved' : 'rejected';
            const statusText = data.valid ? 'APPROVED' : 'REJECTED';
            const flagsHtml = data.flags.map(f => {
                const c = data.valid ? 'good' : 'bad';
                return '<span class="flag-tag ' + c + '">' + escapeHtml(f) + '</span>';
            }).join(' ');
            el.className = 'result ' + cls;
            el.innerHTML = '<div class="status">' + statusText + '</div><div class="flags">' + flagsHtml + '</div>';
        })
        .catch(() => {
            const el = document.getElementById('v-result');
            el.className = 'result rejected';
            el.innerHTML = '<div class="status">ERROR</div><div class="flags">Could not reach API</div>';
        });
    }

    // --- Transactions ---
    function loadTransactions() {
        fetch('/transactions?limit=20').then(r => r.json()).then(data => {
            const el = document.getElementById('txn-table');
            if (!data.transactions || data.transactions.length === 0) {
                el.innerHTML = '<div class="empty">No transactions yet. Validate one first.</div>';
                return;
            }
            let html = '<table><tr><th>Sender</th><th>Receiver</th><th>Amount</th><th>Currency</th><th>Status</th><th>Flags</th><th>Time</th></tr>';
            data.transactions.forEach(t => {
                const status = t.valid ? '<span style="color:#22c55e">✓</span>' : '<span style="color:#ef4444">✗</span>';
                const flags = (t.flags || '').split(',').map(f => {
                    if (!f) return '';
                    const c = f === 'APPROVED' ? 'good' : 'bad';
                    return '<span class="flag-tag ' + c + '">' + escapeHtml(f) + '</span>';
                }).join(' ');
                html += '<tr><td>' + escapeHtml(t.sender) + '</td><td>' + escapeHtml(t.receiver) + '</td><td>' + t.amount + '</td><td>' + escapeHtml(t.currency) + '</td><td>' + status + '</td><td>' + flags + '</td><td style="font-size:11px;color:#64748b">' + escapeHtml(t.created_at || '') + '</td></tr>';
            });
            html += '</table>';
            el.innerHTML = html;
        });
    }

    // --- Stats ---
    function loadStats() {
        fetch('/stats').then(r => r.json()).then(data => {
            const el = document.getElementById('stats-content');
            let html = '<div class="stat-grid">';
            html += '<div class="stat-box blue"><div class="num">' + data.total_transactions + '</div><div class="label">Total</div></div>';
            html += '<div class="stat-box green"><div class="num">' + data.approved + '</div><div class="label">Approved</div></div>';
            html += '<div class="stat-box red"><div class="num">' + data.rejected + '</div><div class="label">Rejected</div></div>';
            html += '<div class="stat-box yellow"><div class="num">' + data.approval_rate + '%</div><div class="label">Approval Rate</div></div>';
            html += '</div>';
            if (data.top_senders && data.top_senders.length > 0) {
                html += '<h2 style="margin-top:18px;font-size:14px;">Top Senders</h2><table><tr><th>Sender</th><th>Transactions</th></tr>';
                data.top_senders.forEach(s => {
                    html += '<tr><td>' + escapeHtml(s.sender) + '</td><td>' + s.cnt + '</td></tr>';
                });
                html += '</table>';
            }
            el.innerHTML = html;
        });
    }

    // --- Blacklist ---
    function loadBlacklist() {
        fetch('/blacklist').then(r => r.json()).then(data => {
            const el = document.getElementById('bl-table');
            if (!data || data.length === 0) {
                el.innerHTML = '<div class="empty">Blacklist is empty.</div>';
                return;
            }
            let html = '<table><tr><th>Entity</th><th>Reason</th><th>Added</th><th></th></tr>';
            data.forEach(b => {
                html += '<tr><td>' + escapeHtml(b.entity) + '</td><td>' + escapeHtml(b.reason || '') + '</td><td style="font-size:11px;color:#64748b">' + escapeHtml(b.created_at || '') + '</td><td><button class="btn btn-danger" onclick="removeBlacklist(\'' + escapeHtml(b.entity) + '\')">Remove</button></td></tr>';
            });
            html += '</table>';
            el.innerHTML = html;
        });
    }

    function addBlacklist() {
        const entity = document.getElementById('bl-entity').value.trim();
        const reason = document.getElementById('bl-reason').value.trim();
        if (!entity) return;
        fetch('/blacklist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entity, reason })
        }).then(() => {
            document.getElementById('bl-entity').value = '';
            document.getElementById('bl-reason').value = '';
            loadBlacklist();
        });
    }

    function removeBlacklist(entity) {
        fetch('/blacklist/' + encodeURIComponent(entity), { method: 'DELETE' }).then(() => loadBlacklist());
    }

    // --- Config ---
    function loadConfig() {
        fetch('/config').then(r => r.json()).then(data => {
            const el = document.getElementById('config-content');
            let html = '';
            html += configRow('Per-Transaction Limit', '₹' + Number(data.per_transaction_limit).toLocaleString());
            html += configRow('Daily Limit', '₹' + Number(data.daily_limit).toLocaleString());
            html += configRow('Supported Currencies', data.supported_currencies.join(', '));
            html += configRow('Velocity Limit', data.velocity_limit);
            html += configRow('Duplicate Window', data.duplicate_window);
            html += '<h2 style="margin-top:16px;font-size:14px;">Active Checks</h2>';
            data.checks.forEach((c, i) => {
                html += '<div class="config-item"><span class="config-key">' + (i + 1) + '.</span><span class="config-val">' + escapeHtml(c) + '</span></div>';
            });
            el.innerHTML = html;
        });
    }

    function configRow(key, val) {
        return '<div class="config-item"><span class="config-key">' + key + '</span><span class="config-val">' + val + '</span></div>';
    }

    // --- Util ---
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }
</script>
</body>
</html>
