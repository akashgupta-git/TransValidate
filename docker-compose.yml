services:
  app:
    build: .
    ports:
      - "5002:5002"
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/transvalidate.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data: