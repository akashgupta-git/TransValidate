name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test  # Only build image if tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t transvalidate:latest .

      - name: Smoke test the container
        run: |
          docker run -d -p 5002:5002 --name tv transvalidate:latest
          sleep 3
          curl -f http://localhost:5002/health
          docker stop tv
